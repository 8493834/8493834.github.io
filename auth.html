<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Card Dealers Inc.</title>
    <link rel="stylesheet" href="style.css">
    <!-- reCAPTCHA v3 -->
    <script src="https://www.google.com/recaptcha/api.js?render=YOUR_RECAPTCHA_SITE_KEY"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Sign in to your account</p>

            <button id="google-signin-btn" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" width="18">
                Continue with Google
            </button>

            <div class="divider"><span>OR</span></div>

            <form id="email-auth-form">
                <input type="email" id="email" required placeholder="Email Address">
                <input type="password" id="password" required placeholder="Password">
                <button type="submit" id="submit-btn" class="cta-button">Sign In</button>
            </form>

            <div id="auth-status" class="status-message"></div>

            <p class="auth-switch">
                <span id="switch-text">New here?</span> 
                <a href="#" id="toggle-auth">Create Account</a>
            </p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.fbAuth = auth;
        window.fbMethods = { 
            createUser: createUserWithEmailAndPassword,
            verifyEmail: sendEmailVerification,
            signIn: signInWithEmailAndPassword,
            googleSignIn: signInWithPopup,
            googleProvider: new GoogleAuthProvider(),
            logout: signOut
        };
    </script>
    <script src="auth.js"></script>
</body>
</html>
