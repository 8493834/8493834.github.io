<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>  
  <title>Payment Page</title>
</head>
<body>

<form action="/process-payment" method="POST" id="payment-form">
  
  <div class="form-group">
    <label for="cardholder-name">Cardholder Name</label>
    <input 
      type="text" 
      id="cardholder-name" 
      name="cardholderName" 
      required 
      autocomplete="cc-name" 
      placeholder="Jane Doe">
  </div>

  <div class="form-group">
    <label for="card-number">Card Number</label>
    <input 
      type="text" 
      id="card-number" 
      name="cardNumber" 
      required 
      inputmode="numeric" 
      pattern="[0-9\s]{13,19}" 
      autocomplete="cc-number" 
      placeholder="xxxx xxxx xxxx xxxx">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="card-expiry">Expiry Date</label>
      <input 
        type="text" 
        id="card-expiry" 
        name="cardExpiry" 
        required 
        inputmode="numeric" 
        pattern="(0[1-9]|1[0-2])\/?([0-9]{4}|[0-9]{2})" 
        autocomplete="cc-exp" 
        placeholder="MM/YY">
    </div>

    <div class="form-group">
      <label for="card-cvv">CVV</label>
      <input 
        type="text" 
        id="card-cvv" 
        name="cardCvv" 
        required 
        inputmode="numeric" 
        pattern="[0-9]{3,4}" 
        autocomplete="cc-csc" 
        placeholder="123">
    </div>
  </div>

  <div class="g-recaptcha" data-sitekey="6Lf0mSwtAAAAAJ2g2DZb9ISKcp6r7SOq5D33aOoX" style="margin: 15px 0;"></div>

  <div id="payment-status" style="margin: 15px 0; font-weight: bold; min-height: 24px;"></div>

  <button type="submit" id="submit-payment">Pay Now</button>

</form>

<script>
document.getElementById('payment-form').addEventListener('submit', function(event) {
  event.preventDefault();

  const statusDiv = document.getElementById('payment-status');
  const submitBtn = document.getElementById('submit-payment');
  
  // 1. Check if reCAPTCHA has been completed
  const recaptchaResponse = grecaptcha.getResponse();
  
  if (recaptchaResponse.length === 0) {
    // If response is empty, the user didn't check the box
    statusDiv.style.color = "red";
    statusDiv.textContent = "Please complete the reCAPTCHA challenge.";
    return; // Stop the script here
  }

  // Clear any previous error styles
  statusDiv.style.color = "inherit";
  
  // Disable the button to prevent double-clicking
  submitBtn.disabled = true;

  let step = 0;
  
  // Interval loops every 600ms to handle the dot animations smoothly
  const paymentInterval = setInterval(() => {
    step++;

    if (step === 1) {
      statusDiv.textContent = "Processing.";
    } else if (step === 2) {
      statusDiv.textContent = "Processing..";
    } else if (step === 3) {
      statusDiv.textContent = "Processing...";
    } else if (step === 4) {
      statusDiv.textContent = "Payment successful now redirecting.";
    } else if (step === 5) {
      statusDiv.textContent = "Redirecting..";
    } else if (step === 6) {
      statusDiv.textContent = "Redirecting...";
    } else if (step >= 7) {
      clearInterval(paymentInterval);
      
      // Redirect to your slides link
      window.location.href = "https://docs.google.com/presentation/d/1O3OYAU9jLZW0aqadzA-icSdGXxZgJ_yTY46fyLRo3Ic/present#slide=id.g3f1694d0966_0_81"; 
    }
  }, 600); 
});
</script>
</body>
</html>
