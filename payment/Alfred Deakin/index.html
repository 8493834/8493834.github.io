<!DOCTYPE html>
<html lang="en">
<head>
    <title> payment page</title>
</head>
<body>
    <form action="/process-payment" method="POST" id="payment-form">
  
  <div class="form-group">
    <label for="cardholder-name">Cardholder Name</label>
    <input 
      type="text" 
      id="cardholder-name" 
      name="cardholderName" 
      required 
      autocomplete="cc-name" 
      placeholder="Jane Doe">
  </div>

  <div class="form-group">
    <label for="card-number">Card Number</label>
    <input 
      type="text" 
      id="card-number" 
      name="cardNumber" 
      required 
      inputmode="numeric" 
      pattern="[0-9\s]{13,19}" 
      autocomplete="cc-number" 
      placeholder="xxxx xxxx xxxx xxxx">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="card-expiry">Expiry Date</label>
      <input 
        type="text" 
        id="card-expiry" 
        name="cardExpiry" 
        required 
        inputmode="numeric" 
        pattern="(0[1-9]|1[0-2])\/?([0-9]{4}|[0-9]{2})" 
        autocomplete="cc-exp" 
        placeholder="MM/YY">
    </div>

    <div class="form-group">
      <label for="card-cvv">CVV</label>
      <input 
        type="text" 
        id="card-cvv" 
        name="cardCvv" 
        required 
        inputmode="numeric" 
        pattern="[0-9]{3,4}" 
        autocomplete="cc-csc" 
        placeholder="123">
    </div>
  </div>

  <button type="submit" id="submit-payment">Pay Now</button>

</form>
</body>













</html>
