<!DOCTYPE html>

<head>

<body>
    <header class="site-header">

            <div class="logo"><a href="index.html">Card Dealers Inc.</a></div>
            <button class="nav-toggle" id="nav-toggle">☰</button>
            <nav class="main-nav" id="main-nav">

                    <li><a href="index.html">Home</a></li>
